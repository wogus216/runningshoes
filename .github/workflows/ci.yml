name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 같은 ref의 진행 중인 run은 취소 (중복 빌드 방지)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: validate → test → lint → build → payload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: 데이터 검증 (validate)
        run: npm run validate

      - name: 테스트 (vitest)
        run: npm test

      - name: 린트 (eslint)
        run: npm run lint

      - name: 빌드 (next build)
        run: npm run build

      - name: 페이로드 회귀 가드
        run: npm run check:payload
