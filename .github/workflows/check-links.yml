name: 구매 링크 체크

on:
  schedule:
    # 매월 1일, 14일 오전 9시 (KST) = 0시 UTC
    - cron: '0 0 1,14 * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: 구매 링크 체크 실행
        id: check
        run: |
          npx tsx scripts/check-purchase-links.ts 2>&1 | tee link-check-output.txt
          # 요약의 실제 카운트로 판정 (요약 라인의 🔴/❌ 이모지 오탐 방지)
          # 품절/에러가 1개 이상일 때만 후속 단계(메일·이슈) 실행
          soldout=$(grep -oE '🔴 품절: [0-9]+개' link-check-output.txt | grep -oE '[0-9]+' | head -1)
          errors=$(grep -oE '❌ 에러: [0-9]+개' link-check-output.txt | grep -oE '[0-9]+' | head -1)
          if [ "${soldout:-0}" -gt 0 ] || [ "${errors:-0}" -gt 0 ]; then
            echo "has_issues=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_issues=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 문제 발견 시 이메일 알림
        if: steps.check.outputs.has_issues == 'true'
        uses: dawidd6/action-send-mail@42942bc2f8fba4e611b459a018967a6a7c78c68c # v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '🔗 구매 링크 점검 필요 (${{ github.run_id }})'
          to: wogus21694@gmail.com
          from: 러닝의모든것 링크체커 <${{ secrets.MAIL_USERNAME }}>
          body: |
            구매 링크 자동 점검에서 문제가 발견되었습니다.

            아래 결과를 확인하고 링크를 업데이트해주세요.

            ---
            ${{ steps.check.outputs.has_issues == 'true' && '문제가 발견되었습니다. 첨부 로그를 확인하세요.' || '정상' }}

            전체 로그: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: 문제 발견 시 Issue 생성
        if: steps.check.outputs.has_issues == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('link-check-output.txt', 'utf8');
            const issues = output.split('\n').filter(l => l.includes('🔴') || l.includes('❌'));

            const body = `## 구매 링크 점검 결과

            자동 점검에서 문제가 발견되었습니다.

            \`\`\`
            ${issues.join('\n')}
            \`\`\`

            <details>
            <summary>전체 결과</summary>

            \`\`\`
            ${output}
            \`\`\`
            </details>

            > 자동 생성된 이슈입니다. \`npx tsx scripts/check-purchase-links.ts\`로 재확인하세요.
            `.replace(/^            /gm, '');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔗 구매 링크 점검 필요 (${new Date().toISOString().slice(0, 10)})`,
              body,
              labels: ['link-check']
            });
