<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="32" x2="32" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#081226"/>
    </linearGradient>
    <linearGradient id="streak" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Speed streaks -->
  <rect x="5" y="19" width="22" height="4" rx="2" fill="url(#streak)" transform="rotate(-22 5 19)"/>
  <rect x="8" y="13" width="16" height="3" rx="1.5" fill="url(#streak)" opacity="0.72" transform="rotate(-22 8 13)"/>
  <rect x="11" y="8"  width="10" height="2.5" rx="1.25" fill="url(#streak)" opacity="0.42" transform="rotate(-22 11 8)"/>
</svg>
